bind = Super+Shift, code:19, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspace 10 # [hidden]
# keypad numbers
bind = Super+Shift, code:87, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspace 1  # [hidden]
