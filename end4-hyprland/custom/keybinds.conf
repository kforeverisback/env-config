# Replacing Workspace switching with a script that sends us to the previous workspace if we try to switch to the workspace we're already on, and otherwise behaves like normal. This is a neat QoL improvement that allows us to quickly toggle between two workspaces without needing an extra keybind.

#----#! Workspace
# Switching
#---/# bind = Super, Hash,, # Focus workspace # (1, 2, 3,...)
# We use raw keycodes because some keyboard layouts register number keys as different chars. The codes can be verified with `wev`
bind = Super, code:10, exec, ~/.config/hypr/custom/scripts/pre_workspace_action.sh workspace 1 # [hidden]
bind = Super, code:11, exec, ~/.config/hypr/custom/scripts/pre_workspace_action.sh workspace 2 # [hidden]
bind = Super, code:12, exec, ~/.config/hypr/custom/scripts/pre_workspace_action.sh workspace 3 # [hidden]
bind = Super, code:13, exec, ~/.config/hypr/custom/scripts/pre_workspace_action.sh workspace 4 # [hidden]
bind = Super, code:14, exec, ~/.config/hypr/custom/scripts/pre_workspace_action.sh workspace 5 # [hidden]
bind = Super, code:15, exec, ~/.config/hypr/custom/scripts/pre_workspace_action.sh workspace 6 # [hidden]
bind = Super, code:16, exec, ~/.config/hypr/custom/scripts/pre_workspace_action.sh workspace 7 # [hidden]
bind = Super, code:17, exec, ~/.config/hypr/custom/scripts/pre_workspace_action.sh workspace 8 # [hidden]
bind = Super, code:18, exec, ~/.config/hypr/custom/scripts/pre_workspace_action.sh workspace 9 # [hidden]
bind = Super, code:19, exec, ~/.config/hypr/custom/scripts/pre_workspace_action.sh workspace 10 # [hidden]
# keypad numbers
bindp = Super, code:87, exec, ~/.config/hypr/custom/scripts/pre_workspace_action.sh workspace 1  # [hidden]
bindp = Super, code:88, exec, ~/.config/hypr/custom/scripts/pre_workspace_action.sh workspace 2  # [hidden]
bindp = Super, code:89, exec, ~/.config/hypr/custom/scripts/pre_workspace_action.sh workspace 3  # [hidden]
bindp = Super, code:83, exec, ~/.config/hypr/custom/scripts/pre_workspace_action.sh workspace 4  # [hidden]
bindp = Super, code:84, exec, ~/.config/hypr/custom/scripts/pre_workspace_action.sh workspace 5  # [hidden]
bindp = Super, code:85, exec, ~/.config/hypr/custom/scripts/pre_workspace_action.sh workspace 6  # [hidden]
bindp = Super, code:79, exec, ~/.config/hypr/custom/scripts/pre_workspace_action.sh workspace 7  # [hidden]
bindp = Super, code:80, exec, ~/.config/hypr/custom/scripts/pre_workspace_action.sh workspace 8  # [hidden]
bindp = Super, code:81, exec, ~/.config/hypr/custom/scripts/pre_workspace_action.sh workspace 9  # [hidden]
bindp = Super, code:90, exec, ~/.config/hypr/custom/scripts/pre_workspace_action.sh workspace 10 # [hidden]


#---/# bind = Super+Shift, Hash,, # Send to workspace # (1, 2, 3,...)
# using movetoworkspace instead of movetoworkspacesilent
# We use raw keycodes because some keyboard layouts register number keys as different chars. The codes can be verified with `wev`
bind = Super+Shift, code:10, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspace 1 # [hidden]
bind = Super+Shift, code:11, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspace 2 # [hidden]
